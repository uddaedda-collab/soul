services:
  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - services/api/.env
    ports:
      - "8080:8080"
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: infra/docker/admin.Dockerfile
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      - api
